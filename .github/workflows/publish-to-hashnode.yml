name: Publish to Hashnode

# NOTE: Hashnode retired free GraphQL API access on 2026-05-13 — the API now requires a paid
# Pro plan (https://hashnode.com/changelog/2026-05-13-graphql-api-paid-access). This workflow
# is therefore manual-only and will fail without Pro. Primary automation is publish-to-devto.
# Keep this around in case the publication is upgraded to Hashnode Pro later.

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: hashnode-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Publish posts
        env:
          HASHNODE_PAT: ${{ secrets.HASHNODE_PAT }}
          HASHNODE_HOST: ${{ vars.HASHNODE_HOST || 'shridhar22.hashnode.dev' }}
        run: python scripts/publish_to_hashnode.py
